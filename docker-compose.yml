Set-Content "C:\Users\Леонтий\Desktop\Новая папка (6)\stomklin\docker-compose.yml" "services:
  backend:
    build: ./backend/NaumovStomKlin.API
    container_name: dental-backend
    ports:
      - '7057:7057'
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:7057
    depends_on:
      - db

  frontend:
    build: ./frontend/dentaplus-frontend
    container_name: dental-frontend
    ports:
      - '3000:80'
    depends_on:
      - backend

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dental-db
    environment:
      SA_PASSWORD: 'StrongPass123!'
      ACCEPT_EULA: 'Y'
    ports:
      - '1433:1433'
    volumes:
      - mssql_data:/var/opt/mssql
      - ./init.sql:/init.sql
      - ./entrypoint.sh:/entrypoint.sh
    command: /bin/bash /entrypoint.sh

volumes:
  mssql_data:"